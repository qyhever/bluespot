root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []
  bin = "./tmp/bluespot"
  cmd = "go build -o ./tmp/bluespot ./cmd/main.go"
  delay = 300
  exclude_dir = [
    ".git",
    "log",
    "public",
    "rest",
    "scripts",
    "sql",
    "tmp",
    "vendor",
    "testdata"
  ]
  exclude_file = []
  exclude_regex = ["_test.go"]
  exclude_unchanged = true
  follow_symlink = false
  full_bin = ""
  include_dir = ["cmd", "internal", "docs"]
  include_ext = ["go", "tpl", "tmpl", "html", "yaml", "yml"]
  include_file = ["go.mod", "go.sum"]
  kill_delay = "500ms"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  rerun = false
  rerun_delay = 500
  send_interrupt = true
  stop_on_root = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = true

[misc]
  clean_on_exit = true

[screen]
  clear_on_rebuild = true
  keep_scroll = true
