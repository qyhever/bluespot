basePath: /api
definitions:
  controller.SwaggerAttachUploadResponse:
    properties:
      code:
        example: 1000
        type: integer
      data:
        $ref: '#/definitions/model.AttachUploadResponse'
      message:
        example: success
        type: string
    type: object
  controller.SwaggerAuthLoginResponse:
    properties:
      code:
        example: 1000
        type: integer
      data:
        $ref: '#/definitions/model.AuthLoginResponse'
      message:
        example: success
        type: string
    type: object
  controller.SwaggerHelloInfoResponse:
    properties:
      code:
        example: 1000
        type: integer
      data:
        $ref: '#/definitions/model.GetHelloInfoResponse'
      message:
        example: success
        type: string
    type: object
  controller.SwaggerUserInfoResponse:
    properties:
      code:
        example: 1000
        type: integer
      data:
        $ref: '#/definitions/model.UserInfoResponse'
      message:
        example: success
        type: string
    type: object
  model.AttachUploadResponse:
    properties:
      fileName:
        type: string
      originName:
        type: string
      url:
        type: string
    type: object
  model.AuthLoginRequest:
    properties:
      password:
        type: string
      username:
        type: string
    required:
    - password
    - username
    type: object
  model.AuthLoginResponse:
    properties:
      accessToken:
        type: string
      refreshToken:
        type: string
    type: object
  model.AuthRefreshTokenRequest:
    properties:
      refreshToken:
        type: string
    required:
    - refreshToken
    type: object
  model.GetHelloInfoRequest:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  model.GetHelloInfoResponse:
    properties:
      name:
        type: string
    type: object
  model.UserInfoResponse:
    properties:
      nickname:
        type: string
      userId:
        type: integer
      username:
        type: string
    type: object
host: localhost:6306
info:
  contact: {}
  description: bluespot-backend HTTP API documentation.
  title: bluespot-backend API
  version: "1.0"
paths:
  /app/getHelloInfo:
    post:
      consumes:
      - application/json
      description: 根据传入 name 返回问候信息。
      parameters:
      - description: 请求参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.GetHelloInfoRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controller.SwaggerHelloInfoResponse'
      summary: 获取问候信息
      tags:
      - app
  /attach/upload:
    post:
      consumes:
      - multipart/form-data
      description: 上传文件到本地存储，并返回公开访问地址。
      parameters:
      - description: 上传文件
        in: formData
        name: file
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controller.SwaggerAttachUploadResponse'
      security:
      - BearerAuth: []
      summary: 上传附件
      tags:
      - attach
  /auth/login:
    post:
      consumes:
      - application/json
      description: 使用管理员用户名和密码换取 accessToken 与 refreshToken。业务失败同样返回 HTTP 200，通过 code/message
        区分。
      parameters:
      - description: 登录参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.AuthLoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controller.SwaggerAuthLoginResponse'
      summary: 管理员登录
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: 使用 refreshToken 换取新的 accessToken 与 refreshToken。业务失败同样返回 HTTP 200，通过
        code/message 区分。
      parameters:
      - description: 刷新参数
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.AuthRefreshTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controller.SwaggerAuthLoginResponse'
      summary: 刷新管理员 Token
      tags:
      - auth
  /meta:
    get:
      consumes:
      - application/json
      description: 返回 public/meta.json 中的动态 JSON 内容；文件缺失时返回 deployTime=unknown。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: 获取部署元信息
      tags:
      - meta
  /user/info:
    get:
      consumes:
      - application/json
      description: 获取当前登录管理员的基础信息，不返回密码。
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/controller.SwaggerUserInfoResponse'
      security:
      - BearerAuth: []
      summary: 获取当前管理员信息
      tags:
      - user
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
