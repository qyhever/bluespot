name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'bluespot-frontend/**'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-frontend-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: bluespot-frontend/.nvmrc
          cache: pnpm
          cache-dependency-path: bluespot-frontend/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: bluespot-frontend
        run: pnpm install --frozen-lockfile

      - name: Configure SSH
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_SSH_RSA: ${{ secrets.SERVER_SSH_RSA }}
        run: |
          : "${SERVER_HOST:?SERVER_HOST secret is required}"
          : "${SERVER_SSH_RSA:?SERVER_SSH_RSA secret is required}"
          install -m 700 -d ~/.ssh
          printf '%s\n' "$SERVER_SSH_RSA" | tr -d '\r' > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy frontend
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: bash bluespot-frontend/scripts/deploy.sh
